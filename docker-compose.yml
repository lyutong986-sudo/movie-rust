services:
  postgres:
    image: postgres:17-alpine
    container_name: movie-rust-postgres
    environment:
      POSTGRES_DB: movie_rust
      POSTGRES_USER: movie
      POSTGRES_PASSWORD: movie
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U movie -d movie_rust"]
      interval: 5s
      timeout: 5s
      retries: 20

  movie-rust:
    image: yuanhu66/movie-rust:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: movie-rust
    environment:
      DATABASE_URL: postgres://movie:movie@postgres:5432/movie_rust
      APP_HOST: 0.0.0.0
      APP_PORT: 8096
      APP_SERVER_NAME: Movie Rust
    ports:
      - "8096:80"
    volumes:
      - ./media:/media:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres-data:
