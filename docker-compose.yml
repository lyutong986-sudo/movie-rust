services:
  postgres:
    image: postgres:17-alpine
    container_name: movie-rust-postgres
    environment:
      POSTGRES_DB: movie_rust
      POSTGRES_USER: movie
      POSTGRES_PASSWORD: movie
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U movie -d movie_rust"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  postgres-data:
