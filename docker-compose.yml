services:
  postgres:
    image: postgres:17-alpine
    container_name: movie-rust-postgres
    environment:
      POSTGRES_DB: movie_rust
      POSTGRES_USER: movie
      POSTGRES_PASSWORD: movie
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U movie -d movie_rust"]
      interval: 5s
      timeout: 5s
      retries: 20

  movie-rust:
    image: movie-rust-local:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: movie-rust
    environment:
      DATABASE_URL: postgres://movie:movie@postgres:5432/movie_rust
      APP_HOST: 0.0.0.0
      APP_PORT: 8096
      APP_SERVER_NAME: Movie Rust
      APP_PUBLIC_URL: http://localhost:10004
      DEBUG: network,jellyfin.api.*
      RUST_LOG: debug
    ports:
      - "10004:8096"
    volumes:
      - ./media:/media:ro
      - ./logs:/config/log
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "10"
