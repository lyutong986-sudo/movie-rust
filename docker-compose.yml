services:
  postgres:
    image: postgres:17-alpine
    container_name: movie-rust-postgres
    environment:
      POSTGRES_DB: movie_rust
      POSTGRES_USER: movie
      POSTGRES_PASSWORD: movie
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U movie -d movie_rust"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    image: ${DOCKERHUB_NAMESPACE:-your-dockerhub-name}/movie-rust-backend:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: movie-rust-backend
    environment:
      DATABASE_URL: postgres://movie:movie@postgres:5432/movie_rust
      APP_HOST: 0.0.0.0
      APP_PORT: 8096
      APP_SERVER_NAME: Movie Rust
      APP_DEFAULT_ADMIN: ${APP_DEFAULT_ADMIN:-admin}
      APP_DEFAULT_PASSWORD: ${APP_DEFAULT_PASSWORD:-admin123}
    ports:
      - "8096:8096"
    volumes:
      - ./media:/media:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: ${DOCKERHUB_NAMESPACE:-your-dockerhub-name}/movie-rust-frontend:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: movie-rust-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres-data:
