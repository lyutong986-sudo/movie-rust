name: Docker Image CI

on:
  push:
    branches: ["mms"]
  pull_request:
    branches: ["mms"]

env:
  IMAGE_TAG: ${{ github.sha }}

jobs:
  backend-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend

      - name: Cargo check
        run: cargo check --manifest-path backend/Cargo.toml

  frontend-build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.11.0
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm --filter @jellyfin-vue/frontend build

  docker:
    runs-on: ubuntu-latest
    needs:
      - backend-check
      - frontend-build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Log in to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/mms'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          tags: movie-rust:ci
          cache-from: type=gha,scope=movie-rust
          cache-to: type=gha,mode=max,scope=movie-rust

      - name: Build and push image
        if: github.event_name == 'push' && github.ref == 'refs/heads/mms'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/movie-rust:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/movie-rust:${{ env.IMAGE_TAG }}
          cache-from: type=gha,scope=movie-rust
          cache-to: type=gha,mode=max,scope=movie-rust
