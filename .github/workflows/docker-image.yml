name: Docker Image CI

# ---------------------------------------------------------------------------
# 单镜像策略（非前后端两个镜像）
# ---------------------------------------------------------------------------
# 根目录唯一 Dockerfile：多阶段构建 —— 阶段① Node 产出 Vue dist，阶段② Rust 产出
# movie-rust-backend，最终运行时镜像内同时包含后端二进制与 /app/public 静态资源。
#
# 推送到注册表的只有「一个」仓库里的标签，例如：
#   <DOCKERHUB_USERNAME>/movie-rust:latest
#   <DOCKERHUB_USERNAME>/movie-rust:<git-sha>
# :latest 与 :sha 指向同一构建产物，不是「前端镜像 + 后端镜像」两套镜像。
#
# 推送前无需在本地执行 npm run build；Vue 在镜像构建过程中完成。
#
# CI 仅此一个 workflow 文件；已移除独立的 frontend-ci，避免双流水线。
# ---------------------------------------------------------------------------

on:
  push:
    branches: [main, master, oll]
  pull_request:
    branches: [main, master, oll]
  workflow_dispatch:

env:
  IMAGE_TAG: ${{ github.sha }}

jobs:
  docker:
    runs-on: ubuntu-latest
    env:
      # 某些 runner/Buildx 组合会在「Check build summary support」阶段异常，
      # 关闭 summary 与 record 上传可避免 iVBOR...（PNG Base64）这类非预期输出导致任务失败。
      DOCKER_BUILD_SUMMARY: "false"
      DOCKER_BUILD_RECORD_UPLOAD: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Log in to Docker Hub
        if: >
          github.event_name == 'push' &&
          (github.ref == 'refs/heads/main' ||
           github.ref == 'refs/heads/master' ||
           github.ref == 'refs/heads/oll')
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image (no push)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          tags: movie-rust:ci
          cache-from: type=gha,scope=movie-rust
          # GHA 缓存服务偶发 502（Unicorn）时，不应让构建失败
          cache-to: type=gha,mode=max,scope=movie-rust,ignore-error=true

      - name: Build and push image
        if: >
          github.event_name == 'push' &&
          (github.ref == 'refs/heads/main' ||
           github.ref == 'refs/heads/master' ||
           github.ref == 'refs/heads/oll')
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/movie-rust:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/movie-rust:${{ env.IMAGE_TAG }}
          cache-from: type=gha,scope=movie-rust
          # 导出缓存失败时继续成功推镜像，避免末尾 cache export 把任务打红
          cache-to: type=gha,mode=max,scope=movie-rust,ignore-error=true
