name: Docker Image CI

on:
  push:
    branches: ["bls"]
  pull_request:
    branches: ["bls"]

env:
  IMAGE_TAG: ${{ github.sha }}

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Log in to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/bls'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          tags: movie-rust:ci
          cache-from: type=gha,scope=movie-rust
          cache-to: type=gha,mode=max,scope=movie-rust

      - name: Build and push image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/movie-rust:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/movie-rust:${{ env.IMAGE_TAG }}
          cache-from: type=gha,scope=movie-rust
          cache-to: type=gha,mode=max,scope=movie-rust
